kotlin.code.style=official

# Proxy configuration for local HTTP(S) proxy (example: 127.0.0.1:7890)
systemProp.http.proxyHost=127.0.0.1
systemProp.http.proxyPort=7890
systemProp.https.proxyHost=127.0.0.1
systemProp.https.proxyPort=7890
# nonProxyHosts applies to both http and https
systemProp.http.nonProxyHosts=localhost|127.*|[::1]

# Force TLS 1.2/1.3 for dependency downloads (avoid older TLS versions)
systemProp.https.protocols=TLSv1.2,TLSv1.3
systemProp.jdk.tls.client.protocols=TLSv1.2,TLSv1.3

# Gradle JVM args - ensure daemon uses the same TLS constraints
org.gradle.jvmargs=-Dfile.encoding=UTF-8 -Dhttps.protocols=TLSv1.2,TLSv1.3 -Djdk.tls.client.protocols=TLSv1.2,TLSv1.3

# Increase network timeouts to be tolerant of slower proxies/mirrors
systemProp.org.gradle.internal.http.connectionTimeout=300000
systemProp.org.gradle.internal.http.socketTimeout=300000
